<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <h2>✨ Nova Tarefa</h2>
  <div class="input-group">
    <select id="taskSubject">
      <option value="">Nenhuma matéria (Opcional)</option>
    </select>
    
    <div class="date-time-row">
      <input type="date" id="taskDate" title="Data da entrega">
      <input type="time" id="taskTime" title="Hora da entrega">
    </div>
    
    <input type="text" id="taskTitle" placeholder="Título da tarefa...">
    
    <input type="text" id="taskDesc" placeholder="Descrição detalhada (Opcional)...">
    
    <input type="url" id="taskLink" placeholder="Link útil (Opcional)...">
    
    <button id="addTaskBtn">Adicionar Tarefa</button>
  </div>
  
  <ul id="activeTasks" class="task-list"></ul>
  
  <div class="action-buttons">
    <a id="openHistory" class="btn-action btn-action-blue">Ver Histórico</a>
    <a id="manageSubjectsBtn" class="btn-action btn-action-purple">Matérias</a>
  </div>
  
  <script src="static/popup.js"></script>
</body>
</html>
